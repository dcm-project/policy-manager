extends:
  - https://raw.githubusercontent.com/aep-dev/aep-openapi-linter/main/spectral.yaml

rules:
  x-aep-resource-no-boolean:
    description: x-aep-resource should be an object with full structure, not just true
    message: "x-aep-resource should define singular, plural, type, and patterns per AEP-4"
    severity: warn
    given: $.components.schemas[*].x-aep-resource
    then:
      function: schema
      functionOptions:
        schema:
          type: object

  aep-132-list-results-field:
    description: List response array field must be named 'results' per AEP-132
    message: "List response schema must use 'results' as the array field name"
    severity: warn
    given: $.components.schemas[?(@.properties.next_page_token)].properties
    then:
      field: results
      function: truthy

  aep-133-create-location-header:
    description: Create (201) response must include Location header per AEP-133
    message: "Create operation 201 response must include a Location header"
    severity: warn
    given: $.paths[*].post.responses.201
    then:
      field: headers.Location
      function: truthy
